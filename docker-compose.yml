services:
  db:
    image: postgres:16-alpine
    container_name: hasad-db
    environment:
      - POSTGRES_DB=hasad
      - POSTGRES_USER=hasad
      - POSTGRES_PASSWORD=hasad_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hasad"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hasad-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hasad-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # These override .env — only list values that differ from .env defaults
      - DATABASE_URL=postgresql+psycopg2://hasad:hasad_password@db:5432/hasad
    volumes:
      - ./backend:/app
    networks:
      - hasad-network
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hasad-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_BASE=http://localhost:8000
      # NOTE: This is intentionally localhost — the browser (running on the host)
      # calls port 8000 which is forwarded by Docker. Do not change to the Docker
      # service name "backend" — that would only work inside the container, not in the browser.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - hasad-network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  hasad-network:
    driver: bridge
